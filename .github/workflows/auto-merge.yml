name: Auto-Merge

on:
  # Automatic: feature/* PRs into develop
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize, labeled]
  # Manual: run from the Actions tab, type the PR number
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to enable auto-merge on'
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-automerge:
    runs-on: ubuntu-latest
    # auto path: only feature/* into develop. manual path: always allowed.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      ( github.event.pull_request.base.ref == 'develop' &&
        startsWith(github.event.pull_request.head.ref, 'feature/') &&
        github.event.pull_request.draft == false )
    steps:
      - name: Enable auto-merge (squash)
        run: gh pr merge --auto --squash "${PR}"
        env:
          PR: ${{ github.event.inputs.pr_number || github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
